volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local
  kestra_tmp:
    driver: local

services:
  cold_storage:
    build:
      context: .
      dockerfile: Dockerfile
    image: blueberry_ingest:v001

  kestra_postgres:
    image: postgres:18
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    env_file: .env_encoded
    image: kestra/kestra:v1.1
    pull_policy: always
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    # To run Kestra in a rootless mode in production, see: https://kestra.io/docs/installation/podman-compose
    user: "root"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_tmp:/tmp/kestra-wd
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io" # it must be a valid email address
              password: Admin123
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
          ai:
            type: gemini
            gemini:
              model-name: "gemini-3-flash"
              api-key: AIzaSyBL8myWnWSjKmTu7qmCfDcDOv1yBs6Iix4
    ports:
      - "8080:8080"
        #  - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_started
  flow_importer:
    profiles: ["dev"]
    image: curlimages/curl:8.8.0
    depends_on:
      - kestra
    volumes:
      - ./flows:/flows:ro
    entrypoint: >
      sh -c "
      until curl -sf http://kestra:8080; do
        echo 'Waiting for Kestra...';
        sleep 3;
      done;
      echo 'Kestra is up, importing flows...';
      for f in /flows/*.yml; do
        echo Importing $$f;
        curl -sf -X POST -u 'admin@kestra.io:Admin123' \
          'http://kestra:8080/api/v1/flows/import?overwrite=true' \
          -F fileUpload=@$$f;
      done;
      echo 'Done importing flows.';
      "
